name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pnpm 11 (packageManager) requires Node >= 22.13; runtime bundles
        # still target node20 via tsup.
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Verify release artifacts
        run: node scripts/check-release.cjs

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        # GHSA-frvp-7c67-39w9 only affects Windows hosts that expose Hono's
        # serve-static adapter. token-burningman is a local stdio MCP server
        # and never imports or runs that HTTP/static-file path. The MCP SDK's
        # supported 1.x range cannot yet take the patched node-server 2.x; the
        # scoped exception is recorded in pnpm-workspace.yaml.
        run: pnpm audit --prod
